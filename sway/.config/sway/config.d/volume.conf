# ~/.config/sway/config.d/volume.conf
# Fedora Sway Spin Volume Keybindings powered by wpctl and Dunst

bindsym --locked XF86AudioMute exec ~/.config/sway/scripts/sway-volume-helper toggle-mute
bindsym --locked XF86AudioLowerVolume exec ~/.config/sway/scripts/sway-volume-helper - 5%
bindsym --locked XF86AudioRaiseVolume exec ~/.config/sway/scripts/sway-volume-helper + 5%
bindsym --locked XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

